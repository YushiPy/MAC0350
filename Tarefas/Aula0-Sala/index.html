<!DOCTYPE html>
<html class="dark sl-theme-dark" lang="pt-br">

<head>
	<title>Jupiterweb</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="stylesheet" href="styles/style.css">
</head>

<body>
	<header>
		<img src="usp-logo-invertido.png" id="usp-logo">
		<img src="usp-logo-texto.png" id="usp-logo-texto">
	</header>
	<div class="barras">
		<div id="header-barra1"></div>
		<div id="header-barra2"></div>
		<div id="header-barra3"></div>
	</div>
	<div class="corpo">
		<nav class="sidebar">
			<div class="sidebar-group-name">
				<p class="sidebar-content" style="font-size: large; font-weight: 700;">Público</p>
			</div>
			<div class="sidebar-item">
				<p class="sidebar-icon">🗓️</p>
				<p class="sidebar-content">Calendário Escolar</p>
			</div>
			<div class="sidebar-item">
				<p class="sidebar-icon">🎓</p>
				<p class="sidebar-content">Cursos de Ingresso</p>
			</div>
			<div class="sidebar-item">
				<p class="sidebar-icon">🧑‍🏫</p>
				<p class="sidebar-content">Disciplina</p>
			</div>
			<div class="sidebar-item">
				<p class="sidebar-icon">📃</p>
				<p class="sidebar-content">Editais</p>
			</div>
			<div class="sidebar-item">
				<p class="sidebar-icon">❓</p>
				<p class="sidebar-content">FAQ</p>
			</div>
			
			<div class="sidebar-group-name">
				<p class="sidebar-content" style="font-size: large; font-weight: 700;">Acesso Restrito</p>
			</div>
			<div class="sidebar-item">
				<p class="sidebar-icon">🚪</p>
				<p class="sidebar-content">Entrar</p>
			</div>
			<div class="sidebar-item">
				<p class="sidebar-icon">🔑</p>
				<p class="sidebar-content">Esqueci a Senha</p>
			</div>
			<div class="sidebar-item">
				<p class="sidebar-icon">1️⃣</p>
				<p class="sidebar-content">Primeiro Acesso</p>
			</div>
		</nav>
		
		<main class="conteudo">
			<div class="login-box">
				<input type="text" placeholder="Usuário" class="login-input">
				<input type="password" placeholder="Senha" class="login-input">
				<button class="login-button" onclick="alert('Login bem-sucedido!')">Entrar</button>
			</div>
		</main>
	</div>
</body>

</html>
