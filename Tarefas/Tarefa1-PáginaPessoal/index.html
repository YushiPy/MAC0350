<!DOCTYPE html>
<html lang="pt-br">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		
		<title>Routo Terada home page</title>

		<style>

			p {
				font-family: Helvetica, sans-serif;
				margin: 0;
				margin-bottom: 1vh;
			}

			body {
				background-color: rgb(33, 33, 33);
				margin: 0;
			}

			.header {
				display: flex;
				height: 7vh;
				width: 100%;
				justify-content: right;
			}

			.header-options {
				display: flex;
				flex-direction: row;
				height: 100%;
				width: fit-content;
				align-items: center;
				justify-content: right;
				margin-right: 15vw;
			}

			.header-text {
				font-size: 18px;
				color: white;
				padding: 0 10px;
				background-color: transparent;
				border: none;
				cursor: pointer;
				transition: color 0.15s;
			}

			.header-text:hover {
				color: green;
			}

			.horizontal-bar {
				height: 1px;
				width: 100%;
				background-color: rgb(110, 110, 110);
			}

			.body-text {
				display: flex;
				flex-direction: column;
				gap: 1vh;
				padding: 5vh 15vw;
				font-size: 20px;
				color: white;
				font-weight: 100;
			}

			#container {
				width: 100%;
			}

			#floated {
				float: right;
				width: 25%;
			}

			#img-routo {
				width: 100%;
				height: auto;
				margin: 0;
				border-radius: 100%;
			}

			#nome-professor {
				font-size: 40px;
				font-weight: bold;
				margin-bottom: 2vh;
			}

			#phd-professor {
				margin-bottom: 2vh;
			}

		</style>
	</head>

	<body>
		<div class="header">
			<div class="header-options">
				<button class="header-text">About</button>
				<button class="header-text">Publication</button>
				<button class="header-text">Projects</button>
				<button class="header-text">Students</button>
			</div>
		</div>
		<div class="horizontal-bar"></div>
		<div class="body-text">

			<div id="container">
				<div id="floated">
					<img src="routo-square.png" id="img-routo">
				</div>
				<p id="nome-professor">
					<span style="font-weight: bold;">Routo</span> Terada
				</p>
				<p id="phd-professor">
					Ph. D. University of Wisconsin-Madison, 1979.
				</p>
				<p>
					I am a Full Professor (Titular) at the

					Department of Computer Science
					Institute of Mathematics and Statistics
					University of São Paulo - USP
					São Paulo, Bra[sz]il.
				</p>
				<a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" style="color: white;">
					My pictures (2002), (1997), (1990)
				</a>
			</div>

		</div>
		<div class="contact-info">

		</div>
		<div class="copyright-notice">

		</div>
	</body>
</html>
